<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Public Paperless Search</title>
</head>
<body>
<h1>Dokumentensuche</h1>
<input id="q" placeholder="Suchbegriff">
<button onclick="search()">Suche</button>
<ul id="results"></ul>

<script>
async function search() {
  const q = document.getElementById("q").value;
  if (!q) return;
  const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
  const data = await res.json();
  const ul = document.getElementById("results");
  ul.innerHTML = "";
  data.forEach(d => {
    const li = document.createElement("li");
    li.innerHTML = `<a href="${d.url}" target="_blank">${d.filename}</a>`;
    ul.appendChild(li);
  });
}
</script>
</body>
</html>
